<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>II Clicks — SALLE Comercial (Demo)</title>
<script src="https://apis.google.com/js/platform.js" async defer></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap');
:root {
  --bg: #0a0a0a; --surface: #111; --surface2: #181818; --surface3: #202020;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --text: #f0ede8; --text2: #a09a92; --text3: #5a5550;
  --orange: #e8a020; --orange-bg: rgba(232,160,32,0.10); --orange-bd: rgba(232,160,32,0.25);
  --blue: #4a90d9; --blue-bg: rgba(74,144,217,0.10);
  --green: #3dab72; --green-bg: rgba(61,171,114,0.10); --green-bd: rgba(61,171,114,0.25);
  --purple: #9b7ce6; --purple-bg: rgba(155,124,230,0.10);
  --red: #e85050; --red-bg: rgba(232,80,80,0.10); --red-bd: rgba(232,80,80,0.25);
  --radius: 12px; --radius-sm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-family:'Barlow',sans-serif}

.phone-shell {
  width: 393px; height: 852px; background: #0a0a0a; border-radius: 44px;
  box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 12px #333, 0 40px 80px rgba(0,0,0,0.7);
  overflow: hidden; position: relative; display: flex; flex-direction: column;
}

.status-bar {
  height: 44px; background: #0a0a0a; display: flex; align-items: center;
  justify-content: space-between; padding: 0 28px 0 32px; flex-shrink: 0;
}
.status-time { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { width: 16px; height: 11px; }

.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;background:var(--bg);flex-shrink:0}
.logo-icon{width:28px;height:28px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:15px;height:15px}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase}
.logo-text span{color:var(--orange)}
.topbar-page{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text);margin-left:auto}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:68px;color:var(--text)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

.tab{display:none}
.tab.active{display:block}

.bottom-nav{height:60px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border:none;background:none;padding:0;transition:color 0.15s}
.bn-item svg{width:17px;height:17px}
.bn-item.active{color:var(--orange)}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 0}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;line-height:1}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px}

.filters{padding:12px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:140px}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;border-radius:6px;outline:none}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;transition:all 0.12s;white-space:nowrap}
.pill.active{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-bd)}

.table-card{margin:0 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-topbar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
.table-count{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--orange)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{padding:7px 10px;text-align:left;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 10px;color:var(--text2);border-bottom:1px solid rgba(255,255,255,0.03);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
.td-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--text)}
.td-val{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text);font-weight:600}
.s-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.s-aprovada{background:rgba(61,171,114,0.12);color:var(--green)}
.s-enviada{background:rgba(74,144,217,0.12);color:var(--blue)}
.s-aberto{background:rgba(232,160,32,0.12);color:var(--orange)}
.s-rascunho{background:rgba(90,85,80,0.2);color:var(--text3)}

.sec-head{display:flex;align-items:center;gap:8px;padding:14px 14px 10px}
.sec-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}
.sec-line{flex:1;height:1px;background:var(--border)}

.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;max-width:300px}
.login-card h2{color:var(--text);margin-bottom:16px;font-size:18px}
.login-card p{color:var(--text2);margin-bottom:24px;font-size:12px}
.login-btn{background:var(--orange);color:var(--bg);border:none;padding:12px 24px;border-radius:6px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
.login-btn:hover{opacity:0.9}

#g_id_onload{display:none}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;color:var(--text);font-size:12px;opacity:0;transition:opacity 0.3s;z-index:10000}
.toast.show{opacity:1}

.loading{text-align:center;padding:24px;color:var(--text2);font-size:12px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="phone-shell">
  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time" id="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9h2v2H1V9zm3 0h2v2H4V9zm3 0h2v2H7V9zm3 0h2v2h-2V9zm3 0h2v2h-2V9zm3 0h2v2h-2V9zm3 0h2v2h-2V9zm-3-3h2v2h-2V6z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm0-2c4.41 0 8-3.59 8-8s-3.59-8-8-8-8 3.59-8 8 3.59 8 8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
    </div>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></div>
    <div class="logo-text">II <span>Clicks</span></div>
    <div class="topbar-page" id="topbar-page">MONITORAMENTO</div>
    <div class="live-dot"></div>
  </div>


  <!-- CONTENT -->
  <div class="content" id="content-area">
    <!-- TAB: MONITORAMENTO -->
    <div class="tab active" id="tab-monitoramento">
      <!-- KPI GRID -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Total</div>
          <div class="kpi-value" id="k-total">—</div>
          <div class="kpi-sub" id="k-total-sub">propostas</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Aprovadas</div>
          <div class="kpi-value" id="k-aprov">—</div>
          <div class="kpi-sub" id="k-taxa">—%</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Valor Total</div>
          <div class="kpi-value" id="k-valor" style="font-size:18px">—</div>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filters">
        <div class="search-wrap">
          <input type="text" id="mf-search" placeholder="Buscar..." onkeyup="applyFilters()">
         <svg viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M15.5 14h-.79...-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
      </div>

      <!-- PILLS (Status Filter) -->
      <div class="filters" style="padding:0 14px 12px">
        <div class="pills">
          <div class="pill active" data-status="" onclick="setPill(this)">Todos</div>
          <div class="pill" data-status="Aprovada" onclick="setPill(this)">Aprovadas</div>
          <div class="pill" data-status="Enviada" onclick="setPill(this)">Enviadas</div>
          <div class="pill" data-status="Link aberto" onclick="setPill(this)">Aberto</div>
          <div class="pill" data-status="Rascunho" onclick="setPill(this)">Rascunho</div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-card">
        <div class="table-topbar">
          <div class="table-title">Propostas</div>
          <div class="table-count" id="tbl-count">0 registros</div>
        </div>
        <table class="tbl">
          <thead>
            <tr>
              <th>ID</th>
              <th>Empresa</th>
              <th>Serviço</th>
              <th>Valor</th>
              <th>Status</th>
              <th>TC</th>
            </tr>
          </thead>
          <tbody id="mf-tbody"></tbody>
        </table>
      </div>
      <div style="height:20px"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="bn-item active" onclick="switchTab(this,'monitoramento')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3.5 4.5h7z"/></svg>
      Monitor
    </button>
    <button class="bn-item" onclick="switchTab(this,'propostas')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-8-6z"/></svg>
      Propostas
    </button>
    <button class="bn-item" onclick="switchTab(this,'calc')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V6h14v14z"/></svg>
      Calcular
    </button>
    <button class="bn-item" onclick="switchTab(this,'admin')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      Admin
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>


<script>
const SHEET_ID = '1gUEdfWTmlLiaZjsOm4qkbNMcGCzUFRR8kosXHDwiQUA';
const SHEET_NAME = 'monitoramento';
let DADOS = [], FILTERED = [], STATUS_FILTER = '';

// ===== GOOGLE AUTH =====
window.onload = function() {
  carregarDados();
  updateTime();
  setInterval(updateTime, 1000);
  setInterval(carregarDados, 30000); // atualiza a cada 30 segundos
};

// ===== CARREGAR DADOS =====
  // SUBSTITUIR a função carregarDados inteira por:
async function carregarDados() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=AIzaSyDxqgKkoYFbbfgdmppnV1gQHrzRyjY5EEM`;
    const response = await fetch(url);

    if (!response.ok) throw new Error('Erro ao carregar dados');
    
    const data = await response.json();
    const rows = data.values || [];
    
    if (rows.length <= 1) {
      showToast('⚠ Nenhum dado encontrado');
      return;
    }

DADOS = rows.slice(1).map(row => ({
  id: row[0] || '',
  empresa: row[1] || '',
  cliente: row[2] || '',
  servico: row[3] || '',
  cidade: row[4] || '',
  valor: parseFloat((row[5] || '0').toString().replace(/[R$.\s]/g, '').replace(',', '.')) || 0,
  enviadaEm: row[6] || '',
  linkAberto: row[7] || '',
  aprovadaEm: row[8] || '',
  status: row[9] || 'Rascunho',
  revisoes: parseInt(row[10]) || 0,
})).filter(r => r.id);

    applyFilters();
    showToast('✓ Dados carregados!');
  } catch (err) {
    showToast('⚠ Erro: ' + err.message);
  }
}

// ===== FUNÇÕES EXISTENTES =====
function updateTime() {
  const now = new Date();
  document.getElementById('status-time').textContent = 
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

function switchTab(el, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('topbar-page').textContent = {monitoramento:'MONITORAMENTO',propostas:'PROPOSTAS',calc:'CALCULAR',admin:'ADMIN'}[name];
}

function fmtBRL(v) { return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function statusCSS(s) { return {Aprovada:'s-aprovada',Enviada:'s-enviada','Link aberto':'s-aberto',Rascunho:'s-rascunho'}[s]||'s-rascunho'; }

function setPill(el) {
  document.querySelectorAll('#tab-monitoramento .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  STATUS_FILTER = el.dataset.status;
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('mf-search').value || '').toLowerCase();
  FILTERED = DADOS.filter(r => {
    if (STATUS_FILTER && r.status !== STATUS_FILTER) return false;
    if (q) {
      const s = (r.empresa + ' ' + r.servico + ' ' + r.cidade + ' ' + r.id).toLowerCase();
      if (!s.includes(q)) return false;
    }
    return true;
  });
  renderKPIs();
  renderTable();
}

function renderKPIs() {
  const total = FILTERED.length;
  const aprov = FILTERED.filter(r => r.status === 'Aprovada').length;
  const env = FILTERED.filter(r => r.status === 'Enviada').length;
  const vis = FILTERED.filter(r => r.status === 'Link aberto').length;
  const denom = aprov + env + vis;
  const taxa = denom > 0 ? (aprov / denom * 100).toFixed(0) : 0;
  const valor = FILTERED.reduce((s, r) => s + r.valor, 0);
  
  document.getElementById('k-total').textContent = total;
  document.getElementById('k-total-sub').textContent = total === 1 ? 'proposta' : 'propostas';
  document.getElementById('k-aprov').textContent = aprov;
  document.getElementById('k-taxa').textContent = taxa + '%';
  document.getElementById('k-valor').textContent = fmtBRL(valor);
}

function renderTable() {
  const agora = new Date();
  function parseBR(s) {
    if (!s) return null;
    const m = s.match(/(\d{2})\/(\d{2})\/(\d{2})\s+(\d{2}):(\d{2})/);
    if (!m) return null;
    return new Date(2000 + parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]), parseInt(m[4]), parseInt(m[5]));
  }
  
  document.getElementById('tbl-count').textContent = FILTERED.length + ' registro' + (FILTERED.length !== 1 ? 's' : '');
  document.getElementById('mf-tbody').innerHTML = FILTERED.map(r => {
    let tc = '<td style="color:var(--text3)">—</td>';
    if (r.status === 'Enviada' && r.enviadaEm) {
      const dE = parseBR(r.enviadaEm);
      if (dE) {
        const diff = agora - dE;
        const d = Math.round(diff / 86400000);
        const h = Math.round(diff / 3600000);
        const label = d >= 1 ? d + 'd' : h + 'h';
        const cor = d >= 3 ? 'var(--red)' : d >= 1 ? 'var(--orange)' : 'var(--green)';
        tc = `<td style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:${cor}">${label}</td>`;
      }
    } else if (r.status === 'Aprovada' && r.enviadaEm && r.aprovadaEm) {
      const dE = parseBR(r.enviadaEm);
      const dA = parseBR(r.aprovadaEm);
      if (dE && dA) {
        const d = Math.round((dA - dE) / 86400000);
        const cor = d <= 3 ? 'var(--green)' : d <= 7 ? 'var(--orange)' : 'var(--red)';
        tc = `<td style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:${cor}">${d}d</td>`;
      }
    }
    return `<tr><td class="td-num">${r.id.replace('Sal','').replace('2026','')}</td><td style="color:var(--text);font-size:11px;max-width:80px;overflow:hidden;text-overflow:ellipsis">${r.empresa}</td><td>${r.servico}</td><td class="td-val">${fmtBRL(r.valor)}</td><td><span class="s-pill ${statusCSS(r.status)}">${r.status}</span></td>${tc}</tr>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
